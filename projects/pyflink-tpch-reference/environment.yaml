schemaVersion: 1
framework: pyflink
mode: plan-only

# 单机 Docker 集群模式：每台物理机运行 1JM + 2TM 容器
# client/jm/tm 角色在同一台机器上用 Docker network 通信
# 宿主机只需要 Docker，Java/Python/Flink 全部在容器内

platforms:
  - id: arm
    arch: aarch64
    hosts:
      - role: client
        hostRef: kunpeng
      - role: jobmanager
        hostRef: kunpeng
      - role: taskmanager
        hostRef: kunpeng

  - id: x86
    arch: x86_64
    hosts:
      - role: client
        hostRef: zen5
      - role: jobmanager
        hostRef: zen5
      - role: taskmanager
        hostRef: zen5

software:
  flinkImage: flink:2.2.0-java17
  flinkPyflinkImages:
    arm: flink-pyflink:2.2.0-py314-arm-final
    x86: flink-pyflink:2.2.0-py314-x86-final
  dockerRequired: true
  clusterTopology: 1jm-2tm
  containerNetwork: flink-network
  pythonVersion: "3.14.3"
  pyflinkVersion: "2.2.0"
  taskmanagerTmpfs: true  # TMs need --tmpfs /tmp:rw,exec to avoid /tmp permission issues
  profilingTools:
    - perf      # perf record / perf annotate / perf report
    - strace    # 系统调用追踪
    - objdump   # 二进制反汇编 (binutils)
    - gdb       # 调试符号查看
    - readelf   # ELF 信息查看

hostRefs:
  kunpeng:
    connect: ssh
    alias: kunpeng
    capabilities:
      ssh: true
      sudo: true
      docker: true
      internet: true
      upload: true
      download: true

  zen5:
    connect: ssh
    alias: zen5
    capabilities:
      ssh: true
      sudo: true
      docker: true
      internet: true
      upload: true
      download: true
