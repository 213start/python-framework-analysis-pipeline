Datasets:
  RandomVideo:
    enabled: false
    output_dir: ./datasets/random_videos
    video_count: 16
    width: 1920
    height: 1080
    fps: 24
    duration_seconds: 20
    format: mp4
    codec: mp4v
    seed: 0
    overwrite: false

E2EUDF:
  num_partitions: 160
  write_report: true
  write_pipeline_output: false
  VideoFilterMapper:
    threshold: 1.0
    n_frames: 5
  FrameExtractMapper:
    target_fps: 2.0
    max_frames: 2000
    max_total_pixels: 134217728
  ReprocessFilterMapper:
    threshold: 1.0
    agent_sleep_seconds: 0.5
  MCQGenerateMapper:
    num_task: 19
    batch_size: 3
    agent_sleep_seconds: 0.5

FilterUDF:
  - MockVideoE2EUDF
