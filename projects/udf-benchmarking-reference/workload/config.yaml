    - 1
    - 2
  cpus_per_node: 24
  head_node: 0
  address: 127.0.0.1:6379
  temp_dir: /tmp/ray_udf_benchmark

MicroUDF:
  num_rows: 1000000
  partition_counts:
    - 1
    - 2
    - 4
    - 8
    - 16
    - 32
    - 64
