MacroUDF:
  num_rows: 1000
  cpu_parallel_workers: 24
  cpu_num_rows: 240
  cpu_num_partitions: 24
  numeric_iterations: 2000
  image_size: 64
  image_passes: 2
  feature_vector_length: 4096
  feature_rounds: 4
  disk_payload_bytes: 4096
  network_mode: mock
  network_num_rows: 100
  network_fixed_sleep_ms: 20
  network_jitter_sleep_ms: 10
  network_failure_rate: 0.0
  network_payload_bytes: 128
  network_url: https://httpbin.org/status/200
